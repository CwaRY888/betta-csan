<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>相機掃碼</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root{--bg:#FAF8F3;--ink:#3B3A36;--ink-soft:#8A867C;--line:#E6E1D6;--accent:#5E7B8C;
  --ok:#6F8B6A;--ok-bg:#EEF3EC;--bad:#BF5B52;--bad-bg:#F9ECEA;--loss:#7D6B99;--loss-bg:#F1EEF6;--muted:#F3F0E9;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans TC","PingFang TC",sans-serif;
  padding:16px;font-size:15px;line-height:1.6}
.wrap{max-width:520px;margin:0 auto}
h1{font-size:18px;font-weight:600;letter-spacing:.1em;margin-bottom:4px}
.sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}
.setup{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px}
.setup label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;margin-top:10px}
.setup label:first-child{margin-top:0}
input{width:100%;font-size:15px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-family:inherit}
input:focus{outline:none;border-color:var(--accent)}
button{font-family:inherit;font-size:15px;padding:11px 18px;border-radius:8px;border:1px solid var(--accent);
  background:var(--accent);color:#fff;cursor:pointer;width:100%;margin-top:12px;letter-spacing:.05em}
button.ghost{background:#fff;color:var(--ink);border-color:var(--line)}
#reader{border-radius:12px;overflow:hidden;border:1px solid var(--line);margin-bottom:12px}
#reader:empty{display:none}
#last{padding:12px 14px;border-radius:10px;background:var(--muted);color:var(--ink-soft);
  font-size:14px;min-height:52px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#last.ok{background:var(--ok-bg);color:var(--ok)}
#last.loss{background:var(--loss-bg);color:var(--loss)}
#last.bad{background:var(--bad-bg);color:var(--bad)}
.stamp{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;
  border-radius:50%;font-size:13px;font-weight:600;border:1.5px solid currentColor;flex:none}
.detail{width:100%;font-size:12px;padding-left:36px;opacity:.85;font-family:ui-monospace,monospace}
.count{font-size:13px;color:var(--ink-soft);text-align:center;margin-top:10px}
.count b{color:var(--accent);font-size:16px}
.note{font-size:12px;color:var(--ink-soft);margin-top:12px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <h1>相 機 掃 碼</h1>
  <p class="sub">掃到自動寫入，主工具會同步顯示</p>

  <div class="setup" id="setup">
    <label>Apps Script 網址（/exec 結尾）</label>
    <input type="text" id="gasUrl" placeholder="https://script.google.com/.../exec">
    <label>裝置名稱</label>
    <input type="text" id="dev" placeholder="例如：手機相機">
    <button id="btnStart">開始掃碼</button>
    <div class="note">※ 批次自動用今日日期，與主工具同步。請用登入公司帳號的 Safari 開啟。設定會記在本機。</div>
  </div>

  <div id="scanArea" style="display:none">
    <div id="reader"></div>
    <div id="last"><span>準備中…</span></div>
    <div class="count">本次已送出 <b id="cnt">0</b> 筆</div>
    <button class="ghost" id="btnStop" style="margin-top:14px">停止／回設定</button>
  </div>
</div>

<script>
const SEP='␟';
let scanner=null, sentCount=0, lastCode='', lastTime=0, sentSerials={};
const LOSS_CUSTS=['CWA.DOA'];

/* ---- 記憶設定 ---- */
const LS='camScanCfg';
(function restore(){
  try{const c=JSON.parse(localStorage.getItem(LS));if(c){
    document.getElementById('gasUrl').value=c.url||'';
    document.getElementById('dev').value=c.dev||'';
  }}catch(e){}
})();

/* ---- QR 解析（與主工具一致）---- */
function toHalf(s){return s.replace(/[\uFF01-\uFF5E]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/\u3000/g,' ');}
function parseQR(text){
  const t=toHalf(text).trim();
  const at=t.indexOf('@'); if(at<=0)return null;
  const cust=t.slice(0,at).trim();
  const parts=t.slice(at+1).split('-'); if(parts.length<3)return null;
  const vloc=parts.pop().trim(), loc=parts.pop().trim(), mid=parts.join('-').trim();
  const star=mid.indexOf('*');
  const fish=(star>=0?mid.slice(0,star):mid).trim();
  const serial=(star>=0?mid.slice(star+1):'').trim();
  if(!cust||!fish||!loc)return null;
  return {cust,fish,serial,loc,vloc};
}

let GAS='',SESS='',DEV='';
function todaySession(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  return String(d.getFullYear()).slice(2)+p(d.getMonth()+1)+p(d.getDate());
}
document.getElementById('btnStart').onclick=()=>{
  GAS=document.getElementById('gasUrl').value.trim().replace(/\?.*$/,'');
  DEV=document.getElementById('dev').value.trim()||'相機';
  SESS=todaySession();   // 批次＝今日日期，與主工具一致
  if(!GAS||!GAS.includes('/exec')){alert('請填正確的 /exec 網址');return;}
  localStorage.setItem(LS,JSON.stringify({url:GAS,dev:DEV}));
  document.getElementById('setup').style.display='none';
  document.getElementById('scanArea').style.display='block';
  startCam();
};
document.getElementById('btnStop').onclick=()=>{
  if(scanner){scanner.stop().then(()=>{scanner.clear();scanner=null;}).catch(()=>{scanner=null;});}
  document.getElementById('scanArea').style.display='none';
  document.getElementById('setup').style.display='block';
};

function startCam(){
  scanner=new Html5Qrcode('reader');
  scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:250}},
    onScan,()=>{}).catch(err=>{
      document.getElementById('last').className='bad';
      document.getElementById('last').innerHTML='<span>無法開啟相機：'+err+'</span>';
    });
}

function onScan(text){
  const now=Date.now();
  if(text===lastCode && now-lastTime<1500)return;  // 防同一碼連掃
  lastCode=text; lastTime=now;
  const p=parseQR(text);
  const el=document.getElementById('last');
  if(!p){
    el.className='bad';
    el.innerHTML='<span class="stamp">誤</span><span>格式無法解析</span><span class="detail">'+esc(text)+'</span>';
    beep(false);return;
  }
  // 批號去重（同一包不重送）
  const sk=p.cust+SEP+p.fish+SEP+p.loc+SEP+(p.serial||'');
  if(sentSerials[sk]){
    el.className='';el.innerHTML='<span class="stamp">重</span><span>此批號已送過</span>';
    return;
  }
  sentSerials[sk]=true;
  sendScan(p,text);
  const isLoss=LOSS_CUSTS.includes(p.cust.toUpperCase());
  el.className=isLoss?'loss':'ok';
  el.innerHTML='<span class="stamp">'+(isLoss?'損':'✓')+'</span><span><b>'+esc(p.fish)+'</b>　已送出</span>'+
    '<span class="detail">'+esc(p.cust)+'｜'+esc(p.loc)+'｜'+esc(p.vloc||'—')+'</span>';
  sentCount++; document.getElementById('cnt').textContent=sentCount;
  beep(true);
}

/* 用 GET 送掃碼（已登入帳號下可通，不需 CORS） */
function sendScan(p,raw){
  const qs='action=scanget&session='+enc(SESS)+'&device='+enc(DEV)+'&raw='+enc(raw)+
    '&cust='+enc(p.cust)+'&fish='+enc(p.fish)+'&serial='+enc(p.serial||'')+
    '&loc='+enc(p.loc)+'&vloc='+enc(p.vloc||'');
  // 用 img/fetch no-cors 觸發寫入，不需讀回應
  fetch(GAS+'?'+qs,{mode:'no-cors'}).catch(()=>{
    // 失敗時退回 img beacon
    const im=new Image(); im.src=GAS+'?'+qs;
  });
}

function enc(s){return encodeURIComponent(String(s==null?'':s));}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

let ac=null;
function beep(ok){
  try{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.frequency.value=ok?1200:320;o.type=ok?'sine':'square';
    g.gain.setValueAtTime(.3,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+(ok?.12:.25));
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+(ok?.12:.25));
    if(!ok&&navigator.vibrate)navigator.vibrate(200);
  }catch(e){}
}
</script>
</body>
</html>
